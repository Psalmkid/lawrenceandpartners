<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lawrence&Partners – Apply</title>
<style>
  /* No hero background image on this page, so no preload needed */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, serif; background: #fff; color: #111; line-height: 1.6; padding-top: 72px; }
  header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(10,10,10,0.97); height: 72px; display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.08); }
  nav { max-width: 1400px; margin: 0 auto; width: 100%; padding: 0 2rem; display: flex; justify-content: space-between; align-items: center; }
  .logo { font-size: 1.5rem; font-weight: 700; color: #fff; text-decoration: none; }
  .apply-container { max-width: 700px; margin: 5rem auto; padding: 0 2rem; }
  .section-label { font-size: 0.65rem; font-family: Arial, sans-serif; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #c0392b; margin-bottom: 0.75rem; }
  h1 { font-size: 2rem; font-weight: 400; margin-bottom: 2rem; }
  .form-group { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
  label { font-family: Arial, sans-serif; font-size: 0.8rem; font-weight: 600; color: #374151; }
  input[type="text"], input[type="email"], input[type="file"] { padding: 0.75rem; border: 1px solid #d1d5db; font-family: Arial, sans-serif; font-size: 0.9rem; outline: none; }
  input:focus { border-color: #c0392b; }
  input[readonly] { background: #f3f4f6; color: #6b7280; border-color: #e5e7eb; cursor: not-allowed; }
  .submit-btn { padding: 1rem; background: #c0392b; color: #fff; border: none; font-family: Arial, sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; }
  .submit-btn:hover { background: #a93226; }
  #toast { visibility: hidden; min-width: 250px; background: #0a0a0a; color: #fff; text-align: center; border-radius: 2px; padding: 16px; position: fixed; z-index: 10000; left: 50%; bottom: 30px; transform: translateX(-50%); font-family: Arial, sans-serif; font-size: 0.85rem; border: 1px solid #c0392b; }
  #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
  @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
  @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
  footer { background: #0a0a0a; color: rgba(255,255,255,0.7); padding: 4rem 0 2rem; text-align: center; }
</style>
</head>
<body>

<header>
  <nav>
    <a href="index.html" class="logo">Lawrence&Partners</a>
    <img src="https://flagcdn.com/w2560/tr.png" alt="Turkey Flag" style="height: 20px; width: auto; display: block;">
  </nav>
</header>

<div class="apply-container">
  <div class="section-label">Job Application</div>
  <h1>Submit Your Application</h1>
  
  <form id="applyForm" onsubmit="handleApply(event)">
    <div class="form-group">
      <label>Position</label>
      <input type="text" id="posInput" name="position" readonly>
    </div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="full_name" required placeholder="Enter your full name">
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" required placeholder="Enter your email">
    </div>
    <div class="form-group">
      <label>Upload CV (PDF only)</label>
      <input type="file" name="resume" accept=".pdf" required>
    </div>
    <button type="submit" class="submit-btn">Send PDF Application</button>
  </form>
</div>

<footer>
  <p>&copy; 2026 Lawrence&Partners. All rights reserved.</p>
</footer>

<div id="toast">Submission Successful: Your application has been received.</div>

<script>
  // Get position from URL
  const urlParams = new URLSearchParams(window.location.search);
  const position = urlParams.get('position');
  if (position) {
    document.getElementById('posInput').value = position;
  } else {
    document.getElementById('posInput').value = "General Application";
  }

  async function handleApply(e) {
    e.preventDefault();
    const form = e.target;
    const formData = new FormData(form);
    const btn = form.querySelector('button');
    
    btn.textContent = "Sending...";
    btn.disabled = true;

    // Replace 'YOUR_FORMSPREE_ID' with your actual Formspree ID
    try {
      const response = await fetch("https://formspree.io/f/xzdovpyk", { // Updated Formspree ID
        method: "POST",
        body: formData,
        headers: { 'Accept': 'application/json' }
      });

      if (response.ok) {
        showToast("Submission Successful: Your application has been received.");
        form.reset();
        setTimeout(() => { window.location.href = 'career.html'; }, 3000);
      } else {
        // Handle errors from Formspree
        const data = await response.json();
        if (data.errors) {
          let errorMessage = "Application failed: ";
          data.errors.forEach(error => { errorMessage += `${error.message} `; });
          showToast(errorMessage.trim());
        } else {
          showToast("There was a problem with your submission. Please try again.");
        }
        btn.textContent = "Send PDF Application";
        btn.disabled = false;
      }
    } catch (err) {
      console.error('Error submitting application:', err);
      showToast("Network error. Please check your connection and try again.");
      btn.textContent = "Send PDF Application";
      btn.disabled = false;
    }
  }

  function showToast(message) {
    var t = document.getElementById("toast");
    t.textContent = message;
    t.className = "show";
    setTimeout(function(){ t.className = t.className.replace("show", ""); }, 3000);
  }
</script>

</body>
</html>
